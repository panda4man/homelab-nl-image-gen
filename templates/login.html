<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in — NL Image Gen</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #14151a;
    --card: #1e2028;
    --border: #33353f;
    --text: #eceef2;
    --muted: #9a9ca6;
    --accent: #6d8dfd;
    --accent-hover: #5a7cf0;
    --error: #f06565;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 1rem;
  }
  .wrap { width: 100%; max-width: 380px; }
  h1 { font-size: 1.4rem; font-weight: 600; margin: 0 0 1rem; text-align: center; }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
    margin-bottom: 1.25rem;
  }
  label {
    display: block;
    font-size: 0.85rem;
    color: var(--muted);
    margin: 0.75rem 0 0.3rem;
  }
  input[type="text"],
  input[type="email"],
  input[type="password"] {
    width: 100%;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.55rem 0.75rem;
    font-size: 1rem;
    font-family: inherit;
  }
  button {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 0.65rem 1.1rem;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    margin-top: 1rem;
  }
  button:hover:not(:disabled) { background: var(--accent-hover); }
  .error-text {
    color: var(--error);
    font-size: 0.9rem;
    background: rgba(240, 101, 101, 0.1);
    border: 1px solid var(--error);
    border-radius: 8px;
    padding: 0.6rem 0.75rem;
    margin-bottom: 1rem;
  }
  .toggle-row {
    text-align: center;
    font-size: 0.88rem;
    color: var(--muted);
  }
  .toggle-row a {
    color: var(--accent);
    text-decoration: none;
    cursor: pointer;
  }
  .toggle-row a:hover { text-decoration: underline; }
  .divider {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    color: var(--muted);
    font-size: 0.8rem;
    margin: 1rem 0 0.75rem;
  }
  .divider::before,
  .divider::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .google-btn {
    display: block;
    text-align: center;
    width: 100%;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.6rem 1.1rem;
    font-size: 0.95rem;
    font-weight: 600;
    text-decoration: none;
    box-sizing: border-box;
  }
  .google-btn:hover { border-color: var(--accent); }
  .hidden { display: none; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Family Image Generator</h1>

  <div class="card">
    <!--ERROR-->

    <form id="login-form" method="post" action="/login">
      <label for="login-username">Username</label>
      <input type="text" id="login-username" name="username" required autocomplete="username">
      <label for="login-password">Password</label>
      <input type="password" id="login-password" name="password" required autocomplete="current-password">
      <button type="submit">Sign in</button>
    </form>

    <form id="register-form" class="hidden" method="post" action="/register">
      <label for="register-username">Username</label>
      <input type="text" id="register-username" name="username" required autocomplete="username">
      <label for="register-email">Email (optional)</label>
      <input type="email" id="register-email" name="email" autocomplete="email">
      <label for="register-password">Password</label>
      <input type="password" id="register-password" name="password" required autocomplete="new-password">
      <button type="submit">Create account</button>
    </form>

    <p class="toggle-row">
      <span id="to-register">Need an account? <a onclick="showRegister()">Register</a></span>
      <span id="to-login" class="hidden">Have an account? <a onclick="showLogin()">Sign in</a></span>
    </p>

    <div class="divider">or</div>
    <a class="google-btn" href="/auth/google">Sign in with Google</a>
  </div>
</div>

<script>
  function showRegister() {
    document.getElementById("login-form").classList.add("hidden");
    document.getElementById("register-form").classList.remove("hidden");
    document.getElementById("to-register").classList.add("hidden");
    document.getElementById("to-login").classList.remove("hidden");
  }
  function showLogin() {
    document.getElementById("register-form").classList.add("hidden");
    document.getElementById("login-form").classList.remove("hidden");
    document.getElementById("to-login").classList.add("hidden");
    document.getElementById("to-register").classList.remove("hidden");
  }
</script>
</body>
</html>
